<style>
@import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --c1:#CCA8D8;--c2:#8474A1;--c3:#6EC6CA;--c4:#089790;--c5:#05585C;
  --ink:#05585C;--ink2:#067275;--muted:#8474A1;
  --bg-form:linear-gradient(145deg,#05585C 0%,#067275 40%,#089790 100%);
}

html,body{height:100%;overflow:hidden}

body{
  font-family:'DM Sans',sans-serif;
  background:#f0fafa;
  display:flex;
  align-items:stretch;
  min-height:100vh;
}

/* ═══ LEFT PANEL ═══ */
.left-panel{
  flex:1 1 58%;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
}

/* Layered mesh background */
.left-panel::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%,rgba(110,198,202,0.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%,rgba(204,168,216,0.14) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(8,151,144,0.06) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* Floating grid dots */
.left-panel::after{
  content:'';
  position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(5,88,92,0.12) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;z-index:0;
}

#artCanvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:1;
}

.left-content{
  position:relative;z-index:2;
  text-align:center;
  pointer-events:none;
  padding:40px;
}

.brand-wordmark{
  font-family:'Clash Display',sans-serif;
  font-size:clamp(3rem,7vw,5.5rem);
  font-weight:700;
  letter-spacing:-3px;
  line-height:1;
  background:linear-gradient(135deg,#05585C 0%,#089790 50%,#6EC6CA 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:12px;
}

.brand-tag{
  font-size:clamp(0.85rem,1.5vw,1.05rem);
  font-weight:300;
  color:#067275;
  letter-spacing:0.12em;
  text-transform:uppercase;
  opacity:0.8;
}

/* Floating accent orbs */
.orb{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  z-index:1;
  animation:float 8s ease-in-out infinite;
}
.orb-1{width:180px;height:180px;background:radial-gradient(circle,rgba(110,198,202,0.25),transparent 70%);top:-40px;left:-40px;animation-delay:0s;}
.orb-2{width:120px;height:120px;background:radial-gradient(circle,rgba(204,168,216,0.3),transparent 70%);bottom:60px;right:40px;animation-delay:-3s;}
.orb-3{width:80px;height:80px;background:radial-gradient(circle,rgba(8,151,144,0.2),transparent 70%);top:40%;right:-20px;animation-delay:-5s;}

@keyframes float{
  0%,100%{transform:translateY(0px) scale(1);}
  50%{transform:translateY(-20px) scale(1.05);}
}

/* Feature pills */
.feature-pills{
  display:flex;gap:10px;justify-content:center;
  flex-wrap:wrap;margin-top:36px;
}
.f-pill{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:100px;
  background:rgba(8,151,144,0.08);
  border:1px solid rgba(8,151,144,0.2);
  font-size:12px;color:#05585C;font-weight:500;
  letter-spacing:0.03em;
  backdrop-filter:blur(4px);
  animation:fadeUp 0.6s ease both;
}
.f-pill:nth-child(1){animation-delay:0.1s}
.f-pill:nth-child(2){animation-delay:0.2s}
.f-pill:nth-child(3){animation-delay:0.3s}
.f-pill svg{width:12px;height:12px;stroke:#089790;stroke-width:2.2;fill:none}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ═══ RIGHT PANEL — form ═══ */
.right-panel{
  flex:0 0 420px;
  min-width:360px;
  background:var(--bg-form);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:clamp(2rem,4vw,3.5rem) clamp(2rem,3.5vw,3rem);
  position:relative;overflow:hidden;
}

/* Decorative shapes */
.rp-shape{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
}
.rp-s1{
  width:300px;height:300px;
  border:1px solid rgba(110,198,202,0.15);
  top:-100px;right:-100px;
}
.rp-s2{
  width:200px;height:200px;
  border:1px solid rgba(204,168,216,0.12);
  bottom:-70px;left:-70px;
}
.rp-s3{
  width:60px;height:60px;
  background:rgba(110,198,202,0.1);
  top:55%;right:-10px;
}
.rp-s4{
  width:40px;height:40px;
  background:rgba(204,168,216,0.12);
  top:15%;left:20px;
  border-radius:12px;
  transform:rotate(20deg);
}

/* Form logo */
.form-badge{
  width:52px;height:52px;
  background:rgba(255,255,255,0.12);
  border:1.5px solid rgba(255,255,255,0.2);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:1.4rem;
  backdrop-filter:blur(8px);
}

.form-headline{
  font-family:'Clash Display',sans-serif;
  font-size:clamp(1.6rem,3vw,2.1rem);
  font-weight:600;
  color:#fff;
  letter-spacing:-0.5px;
  text-align:center;
  margin-bottom:6px;
}
.form-sub{
  font-size:13px;font-weight:300;
  color:rgba(255,255,255,0.6);
  text-align:center;
  margin-bottom:2rem;
  letter-spacing:0.02em;
}

/* Field */
.field-wrap{width:100%;margin-bottom:1rem}
.field-label{
  display:block;
  font-size:10.5px;font-weight:500;
  color:rgba(255,255,255,0.7);
  letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:7px;
}

.qinput{
  width:100%;
  background:rgba(255,255,255,0.1);
  border:1.5px solid rgba(255,255,255,0.18);
  border-radius:12px;
  padding:12px 16px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  color:#fff;outline:none;
  transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;
  backdrop-filter:blur(4px);
}
.qinput::placeholder{color:rgba(255,255,255,0.35)}
.qinput:focus{
  border-color:rgba(110,198,202,0.7);
  background:rgba(255,255,255,0.16);
  box-shadow:0 0 0 4px rgba(110,198,202,0.12);
}

.pw-wrap{position:relative}
.pw-wrap .qinput{padding-right:46px}
.eye-btn{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.55);
  display:flex;align-items:center;
  transition:color 0.2s;
}
.eye-btn:hover{color:#fff}

/* Role selector */
.role-group{display:flex;gap:8px;width:100%}
.role-btn{
  flex:1;padding:11px 0;
  border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.08);
  font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;
  color:rgba(255,255,255,0.65);
  cursor:pointer;transition:all 0.2s;
  letter-spacing:0.02em;
}
.role-btn:hover{background:rgba(255,255,255,0.14);color:#fff}
.role-btn.active{
  background:rgba(255,255,255,0.2);
  border-color:rgba(110,198,202,0.6);
  color:#fff;
  box-shadow:0 2px 12px rgba(110,198,202,0.2);
}

/* Sign in button */
.sign-btn{
  width:100%;padding:13px 0;
  margin-top:1.6rem;
  border-radius:12px;border:none;
  background:#fff;
  color:#05585C;
  font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;
  letter-spacing:0.03em;
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform 0.15s,box-shadow 0.2s;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}
.sign-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.2)}
.sign-btn:active{transform:scale(0.98)}

/* Shake animation */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-6px)}
  40%,80%{transform:translateX(6px)}
}
.shake{animation:shake 0.4s ease}

.ripple{
  position:absolute;border-radius:50%;
  background:rgba(8,151,144,0.2);
  transform:scale(0);
  animation:rippleAnim 0.55s linear;
  pointer-events:none;
}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* Divider */
.divider{display:flex;align-items:center;gap:10px;margin:1rem 0;width:100%}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,0.14)}
.divider-text{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.05em}

/* Social */
.social-row{display:flex;gap:8px;width:100%}
.social-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 0;border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.08);
  font-size:12px;font-family:'DM Sans',sans-serif;
  color:rgba(255,255,255,0.75);font-weight:500;
  cursor:pointer;transition:all 0.2s;
}
.social-btn:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.32);color:#fff}

/* Responsive */
@media(max-width:768px){
  body{flex-direction:column;overflow:auto}
  .left-panel{flex:none;min-height:300px;width:100%}
  .right-panel{flex:none;width:100%;min-width:100%;padding:2.5rem 1.8rem}
}

.qinput:focus-visible{box-shadow:0 0 0 3px rgba(110,198,202,0.25)}
</style>

<div class="page" style="display:flex;width:100%;min-height:100vh;flex-wrap:wrap;">

  <!-- LEFT -->
  <div class="left-panel">
    <canvas id="artCanvas"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="left-content">
      <div class="brand-wordmark">Quizely</div>
      <div class="brand-tag">Learn smarter · Score higher</div>
      <div class="feature-pills">
        <span class="f-pill"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Smart assessments</span>
        <span class="f-pill"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Live analytics</span>
        <span class="f-pill"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Real-time results</span>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="rp-shape rp-s1"></div>
    <div class="rp-shape rp-s2"></div>
    <div class="rp-shape rp-s3"></div>
    <div class="rp-shape rp-s4"></div>

    <div class="form-badge">
      <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
    </div>

    <div class="form-headline">Welcome back</div>
    <div class="form-sub">Sign in to continue learning</div>

    <div class="field-wrap">
      <label class="field-label">Email address</label>
      <input class="qinput" id="emailField" type="email" placeholder="you@school.edu"/>
    </div>

    <div class="field-wrap">
      <label class="field-label">Password</label>
      <div class="pw-wrap">
        <input class="qinput" type="password" placeholder="••••••••" id="pwField"/>
        <button class="eye-btn" onclick="togglePw(this)" type="button" aria-label="Toggle password">
          <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field-wrap" style="margin-bottom:0">
      <label class="field-label">I am a</label>
      <div class="role-group">
        <button class="role-btn active" id="rStudent" onclick="setRole('student')">Student</button>
        <button class="role-btn" id="rTeacher" onclick="setRole('teacher')">Teacher</button>
      </div>
    </div>

    <button class="sign-btn" id="signBtn" onclick="handleLogin(event)">Sign in →</button>
  </div>
</div>

<script>
function togglePw(btn) {
  var f = document.getElementById('pwField');
  var icon = btn.querySelector('svg');
  if (f.type === 'password') {
    f.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.8"/>';
  } else {
    f.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function setRole(role) {
  document.getElementById('rStudent').classList.toggle('active', role === 'student');
  document.getElementById('rTeacher').classList.toggle('active', role === 'teacher');
}

async function handleLogin(e) {
  const idField = document.getElementById("emailField");
  const pwField = document.getElementById("pwField");
  let role = document.getElementById("rStudent").classList.contains("active") ? "STUDENT" : "TEACHER";
  try {
    const response = await fetch("/api/auth/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({id: idField.value, password: pwField.value, role: role})
    });
    if (response.ok) {
      const data = await response.json();
      sessionStorage.setItem('quizely_user', JSON.stringify(data));
      if (data.role === "TEACHER") window.location.href = "/teacher.html";
      else if (data.role === "STUDENT") window.location.href = "/student.html";
      else alert("Unknown role: " + data.role);
    } else {
      const errorText = await response.text();
      alert(errorText);
    }
  } catch(error) {
    console.error(error);
    alert("Login Failed");
  }
}

function animateCount(el, target, suffix) {
  var start = 0, dur = 1600, step = 16;
  var inc = target / (dur / step);
  var timer = setInterval(function() {
    start += inc;
    if (start >= target) { start = target; clearInterval(timer); }
    el.textContent = Math.round(start) + suffix;
  }, step);
}

var canvas = document.getElementById('artCanvas');
var ctx = canvas.getContext('2d');
var mouse = { x: -999, y: -999 };
var nodes = [];
var W, H;

function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; }
resize();

var colors = ['#6EC6CA','#089790','#05585C','#CCA8D8','#8474A1'];
for (var i = 0; i < 55; i++) {
  nodes.push({
    x: Math.random() * (W||500), y: Math.random() * (H||600),
    vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
    r: 2 + Math.random()*5,
    color: colors[Math.floor(Math.random()*colors.length)],
    alpha: 0.25 + Math.random()*0.45
  });
}

canvas.parentElement.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top;
});
canvas.parentElement.addEventListener('mouseleave', function() { mouse.x = -999; mouse.y = -999; });

function draw() {
  if (canvas.offsetWidth !== W || canvas.offsetHeight !== H) resize();
  ctx.clearRect(0, 0, W, H);
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    var dx = n.x - mouse.x, dy = n.y - mouse.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 100) {
      var force = (100 - dist) / 100 * 1.5;
      n.vx += (dx/dist)*force*0.06; n.vy += (dy/dist)*force*0.06;
    }
    n.vx *= 0.97; n.vy *= 0.97;
    n.x += n.vx; n.y += n.vy;
    if (n.x < 0) { n.x = 0; n.vx *= -1; }
    if (n.x > W) { n.x = W; n.vx *= -1; }
    if (n.y < 0) { n.y = 0; n.vy *= -1; }
    if (n.y > H) { n.y = H; n.vy *= -1; }
  }
  // Draw connections
  for (var i = 0; i < nodes.length; i++) {
    for (var j = i+1; j < nodes.length; j++) {
      var dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
      var d = Math.sqrt(dx*dx+dy*dy);
      if (d < 100) {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(8,151,144,${0.15*(1-d/100)})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
    ctx.fillStyle = n.color;
    ctx.globalAlpha = n.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  requestAnimationFrame(draw);
}
draw();
</script>
